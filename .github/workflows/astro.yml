name: Deploy Astro site to Pages (Bun)

on:
  push:
    branches: ["master"]
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  BUILD_PATH: "."
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies (Bun)
        run: bun install
        working-directory: ${{ env.BUILD_PATH }}

      - name: Run tests
        run: bun test
        working-directory: ${{ env.BUILD_PATH }}

      - name: Build with Astro (Bun)
        env:
          GITHUB_TOKEN: ${{ secrets.THE_REPO_TOKEN }}
          VITE_THE_REPO_TOKEN: ${{ secrets.THE_REPO_TOKEN }}
        run: |
          bunx astro build \
            --site "${{ steps.pages.outputs.origin }}" \
            --base "${{ steps.pages.outputs.base_path }}"
        working-directory: ${{ env.BUILD_PATH }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_PATH }}/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
